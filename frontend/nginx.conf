# ══════════════════════════════════════════════════════════════════════
#  ArchLens Frontend (v2) — Nginx SPA + proxy /api → Kong
# ══════════════════════════════════════════════════════════════════════

upstream kong_gateway {
    server kong:8000;
}

upstream s3_storage {
    server localstack:4566;
}

server {
    listen       8080 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Content Security Policy — autoriza Clerk ─────────────────────
    set $csp_default  "default-src 'self'";
    set $csp_script   "script-src 'self' 'unsafe-inline' https://*.clerk.accounts.dev https://clerk.accounts.dev";
    set $csp_style    "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com";
    set $csp_font     "font-src 'self' https://fonts.gstatic.com data:";
    set $csp_img      "img-src 'self' data: blob: https://img.clerk.com https://*.clerk.accounts.dev";
    set $csp_connect  "connect-src 'self' https://*.clerk.accounts.dev https://clerk.accounts.dev";
    set $csp_frame    "frame-src https://*.clerk.accounts.dev https://challenges.cloudflare.com";
    set $csp_worker   "worker-src 'self' blob:";
    set $csp_object   "object-src 'none'";
    set $csp_base     "base-uri 'self'";
    set $csp_form     "form-action 'self'";

    add_header Content-Security-Policy "$csp_default; $csp_script; $csp_style; $csp_font; $csp_img; $csp_connect; $csp_frame; $csp_worker; $csp_object; $csp_base; $csp_form" always;

    # ── Healthcheck ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Assets estáticos (cache agressivo, hash no nome) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════════════
    #  Proxy /api → Kong (preserva Cookies HttpOnly do Clerk)
    # ══════════════════════════════════════════════════════════════
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://kong_gateway;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_cookie_path   / "/; HttpOnly; Secure; SameSite=None";
        proxy_cookie_domain ~. $host;

        proxy_buffering      off;
        proxy_read_timeout   60s;
        proxy_connect_timeout 10s;

        client_max_body_size 10m;
    }

    # ══════════════════════════════════════════════════════════════
    #  Proxy /s3/ → LocalStack (download de relatórios via URL presigned)
    #  S3 SigV2 não inclui Host na assinatura, então o rewrite é seguro.
    # ══════════════════════════════════════════════════════════════
    location /s3/ {
        rewrite ^/s3/(.*)$ /$1 break;

        proxy_pass         http://s3_storage;
        proxy_http_version 1.1;
        proxy_set_header   Host localstack:4566;

        proxy_buffering      off;
        proxy_read_timeout   30s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    error_page 404 /index.html;
}
