# projectKey e organization sao injetados pelo workflow via -D (repository Variables).
# Mantenha aqui apenas config tecnica reutilizavel por qualquer fork.
sonar.projectName=ArchLens - Frontend

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.typescript.tsconfigPath=tsconfig.json

# Sem test runner configurado ainda — quando adicionar vitest/jest com cobertura,
# apontar o lcov aqui: sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=**/dist/**,**/node_modules/**,**/*.d.ts,**/vite-env.d.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__mocks__/**

sonar.sourceEncoding=UTF-8
