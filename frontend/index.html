<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0A2540" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>ArchLens</title>

    <!-- New Relic Browser (Pro+SPA) — só inicializa se VITE_NEWRELIC_LICENSE_KEY estiver setada em build time. -->
    <script>
      (function () {
        var licenseKey = "%VITE_NEWRELIC_LICENSE_KEY%";
        var applicationID = "%VITE_NEWRELIC_BROWSER_APP_ID%";
        var accountID = "%VITE_NEWRELIC_ACCOUNT_ID%";
        var agentID = "%VITE_NEWRELIC_BROWSER_AGENT_ID%";
        var trustKey = "%VITE_NEWRELIC_TRUST_KEY%";
        // Vite mantém o literal '%VITE_…%' quando a env var é vazia/ausente.
        // Sem licença válida, não carregamos o agent — evita beacon quebrado.
        if (!licenseKey || licenseKey.indexOf("%VITE_") === 0) return;

        window.NREUM = window.NREUM || {};
        window.NREUM.init = {
          distributed_tracing: {
            enabled: true,
            cors_use_newrelic_header: true,
            cors_use_tracecontext_headers: true,
            allowed_origins: [window.location.origin]
          },
          privacy: { cookies_enabled: true },
          ajax: { deny_list: ["bam.nr-data.net"] }
        };
        window.NREUM.loader_config = {
          accountID: accountID,
          trustKey: trustKey || accountID,
          agentID: agentID || applicationID,
          licenseKey: licenseKey,
          applicationID: applicationID
        };
        window.NREUM.info = {
          beacon: "bam.nr-data.net",
          errorBeacon: "bam.nr-data.net",
          licenseKey: licenseKey,
          applicationID: applicationID,
          sa: 1
        };
        var s = document.createElement("script");
        s.src = "https://js-agent.newrelic.com/nr-loader-spa-current.min.js";
        s.async = true;
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
