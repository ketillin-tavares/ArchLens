# ── KongPlugin: Rate Limiting ─────────────────────────────────────────
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
plugin: rate-limiting
config:
  minute: 30
  policy: local
  fault_tolerant: true
  hide_client_headers: false
---
# ── KongPlugin: CORS ──────────────────────────────────────────────────
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
plugin: cors
config:
  # Wildcard "*" é incompatível com credentials=true (cookies Clerk HttpOnly).
  # ${CLOUDFRONT_ORIGIN} é resolvido em tempo de deploy pelo workflow
  # infra-deploy.yaml (step "Resolve CloudFront origin") via envsubst.
  origins:
    - "${CLOUDFRONT_ORIGIN}"
  methods:
    - GET
    - POST
    - OPTIONS
  headers:
    - Content-Type
    - Authorization
    - Cookie
  exposed_headers:
    - Set-Cookie
  credentials: true
  max_age: 3600
---
# ── KongPlugin: Request Size Limiting (global — 10MB) ────────────────
# No docker-compose eh plugin global; aqui aplicamos em todos os Ingresses.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: request-size-limiting
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
plugin: request-size-limiting
config:
  allowed_payload_size: 10
  size_unit: megabytes
---
# ── KongPlugin: JWT Auth ──────────────────────────────────────────────
# Mesmo metodo do docker-compose (gateways/kong/kong.yml.template).
# Aplicado APENAS nas rotas /v1/*. As rotas de health (/upload, /report,
# /processing) NAO tem auth — espelha o comportamento do compose.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
plugin: jwt
config:
  claims_to_verify:
    - exp
  key_claim_name: iss
  secret_is_base64: false
---
# ── KongConsumer + Credential (JWT) ───────────────────────────────────
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: archlens-client
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
username: archlens-client
credentials:
  - archlens-jwt-credential
---
apiVersion: v1
kind: Secret
metadata:
  name: archlens-jwt-credential
  namespace: archlens
  labels:
    konghq.com/credential: jwt
type: Opaque
stringData:
  algorithm: "HS256"
  key: "archlens-issuer"
  secret: "change-me-via-vault-bootstrap"   # trocar pelo valor do Vault apos bootstrap (KONG_JWT_SECRET)
---
# ══════════════════════════════════════════════════════════════════════
#  UPLOAD SERVICE — 2 Ingresses (/v1/analises com JWT + /upload health)
# ══════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upload-service-ingress
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
    konghq.com/plugins: rate-limiting,cors,request-size-limiting,jwt
    konghq.com/strip-path: "false"
spec:
  rules:
    - http:
        paths:
          - path: /v1/analises
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: upload-service-health-ingress
  namespace: archlens
  annotations:
    kubernetes.io/ingress.class: "kong"
    konghq.com/plugins: rate-limiting,cors,request-size-limiting
    konghq.com/strip-path: "true"
spec:
  rules:
    - http:
        paths:
          - path: /upload
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 8000
---
