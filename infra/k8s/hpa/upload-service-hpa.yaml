# ── HPA: upload-service ───────────────────────────────────────────────
# Escala com base em CPU (70%) e memória (80%).
# Upload é I/O-bound (recebe arquivos), então CPU sobe rápido em picos.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-service-hpa
  namespace: archlens
  labels:
    app: upload-service
    project: archlens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-service
  minReplicas: 2
  maxReplicas: 6
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: upload-service-pdb
  namespace: archlens
  labels:
    app: upload-service
    project: archlens
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: upload-service
