# ══════════════════════════════════════════════════════════════════════
#  upload-service — Deployment + Service
# ══════════════════════════════════════════════════════════════════════
#  Segredos via Vault Agent INIT CONTAINER manual (sem injector).
#  - vault-agent-config (ConfigMap) define agent.hcl
#  - initContainer roda `vault agent -exit-after-auth=true` que renderiza
#    /vault/secrets/app-env via emptyDir compartilhada
#  - main container faz `source` antes de subir o uvicorn
#
#  Bypass do Vault Agent Injector porque vault-k8s 1.7.x panica em
#  /mutate (nil pointer em handler.go:187). Quando o injector for
#  consertado, basta voltar pras annotations e remover este boilerplate.
#
#  Envs não sensíveis via ConfigMap. Acesso S3 via IRSA (upload-service-sa).
#  Imagem atualizada pelo services-deploy.yaml (kubectl set image).
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-service-config
  namespace: archlens
data:
  DATABASE_PORT: "5432"
  DATABASE_NAME: "upload_db"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "archlens"
  RABBITMQ_EXCHANGE_NAME: "analise.events"
  RABBITMQ_QUEUE_NAME: "upload-service.status-updates"
  AWS_REGION: "us-east-2"
  SERVICE_NAME: "upload-service"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  NRIA_DISPLAY_NAME: "upload-service"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-service-vault-agent
  namespace: archlens
data:
  agent.hcl: |
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "archlens-services"
        }
      }
      sink "file" {
        config = {
          path = "/home/vault/.token"
        }
      }
    }

    vault {
      address = "http://vault.archlens.svc.cluster.local:8200"
    }

    template {
      destination = "/vault/secrets/app-env"
      contents = <<EOH
      {{- with secret "secret/data/archlens/upload" -}}
      export DATABASE_HOST="{{ .Data.data.DATABASE_HOST }}"
      export DATABASE_USER="{{ .Data.data.DATABASE_USER }}"
      export DATABASE_PASSWORD="{{ .Data.data.DATABASE_PASSWORD }}"
      export RABBITMQ_HOST="{{ .Data.data.RABBITMQ_HOST }}"
      export RABBITMQ_PASSWORD="{{ .Data.data.RABBITMQ_PASSWORD }}"
      export S3_BUCKET_NAME="{{ .Data.data.S3_BUCKET_NAME }}"
      export NEW_RELIC_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
      export NEW_RELIC_ACCOUNT_ID="{{ .Data.data.NEW_RELIC_ACCOUNT_ID }}"
      export NRIA_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
      {{- end }}
      EOH
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: archlens
  labels:
    app: upload-service
    project: archlens
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: upload-service
  template:
    metadata:
      labels:
        app: upload-service
        project: archlens
    spec:
      serviceAccountName: upload-service-sa
      terminationGracePeriodSeconds: 30

      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: vault-agent-config
          configMap:
            name: upload-service-vault-agent
        - name: vault-token-home
          emptyDir: {}

      initContainers:
        - name: vault-agent
          image: hashicorp/vault:1.20.0
          args:
            - "agent"
            - "-config=/vault/config/agent.hcl"
            - "-exit-after-auth=true"
          volumeMounts:
            - name: vault-agent-config
              mountPath: /vault/config
              readOnly: true
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: vault-token-home
              mountPath: /home/vault
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false

      containers:
        - name: upload-service
          # Tag sobrescrita pelo pipeline; manter :latest aqui apenas como placeholder
          # (ECR esta IMMUTABLE; a tag real sera uma versao v*, setada via kubectl set image).
          image: PLACEHOLDER/archlens/upload-service:latest
          imagePullPolicy: IfNotPresent

          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              [ -f /vault/secrets/app-env ] && . /vault/secrets/app-env
              exec newrelic-admin run-program uvicorn src.main:app --host 0.0.0.0 --port 8000

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: upload-service-config

          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true

          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: archlens
  labels:
    app: upload-service
spec:
  type: ClusterIP
  selector:
    app: upload-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
