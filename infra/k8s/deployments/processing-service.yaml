# ══════════════════════════════════════════════════════════════════════
#  processing-service — Deployment + Service
# ══════════════════════════════════════════════════════════════════════
#  Pipeline multi-agent com roundtrips no LiteLLM (Gemini vision + text).
#  Resources mais folgados que os outros servicos (LLM I/O-bound + parsing).
#  Segredos via Vault Agent INIT CONTAINER manual (sem injector — bypass do
#  bug do vault-k8s 1.7.x). Ver upload-service.yaml para racional completo.
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: processing-service-config
  namespace: archlens
data:
  DATABASE_PORT: "5432"
  DATABASE_NAME: "processing_db"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "archlens"
  RABBITMQ_EXCHANGE_NAME: "analise.events"
  RABBITMQ_QUEUE_NAME: "processing-service.pipeline"
  AWS_REGION: "us-east-2"
  LLM_BASE_URL: "http://litellm-proxy.archlens.svc.cluster.local:4000"
  LLM_MODEL_NAME: "archlens-vision"
  LLM_ANALYZER_MODEL_NAME: "archlens-analyzer"
  LLM_TEMPERATURE: "0.1"
  LLM_MAX_TOKENS: "4096"
  ENABLE_MULTIAGENT: "true"
  ENABLE_JUDGE: "false"
  SERVICE_NAME: "processing-service"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  NRIA_DISPLAY_NAME: "processing-service"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: processing-service-vault-agent
  namespace: archlens
data:
  agent.hcl: |
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "archlens-services"
        }
      }
      sink "file" {
        config = {
          path = "/home/vault/.token"
        }
      }
    }

    vault {
      address = "http://vault.archlens.svc.cluster.local:8200"
    }

    template {
      destination = "/vault/secrets/app-env"
      contents = <<EOH
      {{- with secret "secret/data/archlens/processing" -}}
      export DATABASE_HOST="{{ .Data.data.DATABASE_HOST }}"
      export DATABASE_USER="{{ .Data.data.DATABASE_USER }}"
      export DATABASE_PASSWORD="{{ .Data.data.DATABASE_PASSWORD }}"
      export RABBITMQ_HOST="{{ .Data.data.RABBITMQ_HOST }}"
      export RABBITMQ_PASSWORD="{{ .Data.data.RABBITMQ_PASSWORD }}"
      export S3_BUCKET_NAME="{{ .Data.data.S3_BUCKET_NAME }}"
      export LLM_API_KEY="{{ .Data.data.LLM_API_KEY }}"
      export NEW_RELIC_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
      export NEW_RELIC_ACCOUNT_ID="{{ .Data.data.NEW_RELIC_ACCOUNT_ID }}"
      export NRIA_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
      {{- end }}
      EOH
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
  namespace: archlens
  labels:
    app: processing-service
    project: archlens
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
        project: archlens
    spec:
      serviceAccountName: processing-service-sa
      terminationGracePeriodSeconds: 60

      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: vault-agent-config
          configMap:
            name: processing-service-vault-agent
        - name: vault-token-home
          emptyDir: {}

      initContainers:
        - name: vault-agent
          image: hashicorp/vault:1.20.0
          args:
            - "agent"
            - "-config=/vault/config/agent.hcl"
            - "-exit-after-auth=true"
          volumeMounts:
            - name: vault-agent-config
              mountPath: /vault/config
              readOnly: true
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: vault-token-home
              mountPath: /home/vault
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false

      containers:
        - name: processing-service
          image: PLACEHOLDER/archlens/processing-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              [ -f /vault/secrets/app-env ] && . /vault/secrets/app-env
              exec newrelic-admin run-program uvicorn src.main:app --host 0.0.0.0 --port 8001
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: processing-service-config
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
  namespace: archlens
  labels:
    app: processing-service
spec:
  type: ClusterIP
  selector:
    app: processing-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
