# ══════════════════════════════════════════════════════════════════════
#  report-service — Deployment + Service
# ══════════════════════════════════════════════════════════════════════
#  Gera relatorios Markdown. Text-only (sem vision). Resources menores.
#  Usa ServiceAccount `default` — nao precisa de IRSA (sem S3 write).
# ══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: report-service-config
  namespace: archlens
data:
  DATABASE_PORT: "5432"
  DATABASE_NAME: "report_db"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "archlens"
  RABBITMQ_EXCHANGE_NAME: "analise.events"
  RABBITMQ_QUEUE_NAME: "report-service.reports"
  AWS_REGION: "us-east-2"
  LLM_BASE_URL: "http://litellm-proxy.archlens.svc.cluster.local:4000"
  LLM_MODEL_NAME: "archlens-analyzer"
  SERVICE_NAME: "report-service"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  NRIA_DISPLAY_NAME: "report-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: archlens
  labels:
    app: report-service
    project: archlens
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
        project: archlens
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "archlens-services"
        vault.hashicorp.com/agent-inject-secret-app-env: "secret/data/archlens/report"
        vault.hashicorp.com/agent-inject-template-app-env: |
          {{- with secret "secret/data/archlens/report" -}}
          export DATABASE_HOST="{{ .Data.data.DATABASE_HOST }}"
          export DATABASE_USER="{{ .Data.data.DATABASE_USER }}"
          export DATABASE_PASSWORD="{{ .Data.data.DATABASE_PASSWORD }}"
          export RABBITMQ_HOST="{{ .Data.data.RABBITMQ_HOST }}"
          export RABBITMQ_PASSWORD="{{ .Data.data.RABBITMQ_PASSWORD }}"
          export S3_BUCKET_NAME="{{ .Data.data.S3_BUCKET_NAME }}"
          export LLM_API_KEY="{{ .Data.data.LLM_API_KEY }}"
          export NEW_RELIC_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
          export NEW_RELIC_ACCOUNT_ID="{{ .Data.data.NEW_RELIC_ACCOUNT_ID }}"
          export NRIA_LICENSE_KEY="{{ .Data.data.NEW_RELIC_LICENSE_KEY }}"
          {{- end }}
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      containers:
        - name: report-service
          image: PLACEHOLDER/archlens/report-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              [ -f /vault/secrets/app-env ] && . /vault/secrets/app-env
              exec newrelic-admin run-program uvicorn src.main:app --host 0.0.0.0 --port 8002
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: report-service-config
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: report-service
  namespace: archlens
  labels:
    app: report-service
spec:
  type: ClusterIP
  selector:
    app: report-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
