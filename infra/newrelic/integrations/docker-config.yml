integrations:
  - name: nri-docker
    when:
      file_exists: /var/run/docker.sock
    env:
      # Agent roda dentro de container; sem HOST_ROOT o nri-docker le
      # cgroups do proprio container (so vê metricas do newrelic-infra).
      # /host vem do mount "/:/host:ro" do docker-compose.ec2.yml.
      HOST_ROOT: /host
    # Aspas obrigatorias: sem elas o YAML promove '15s' a int 15 num
    # parser-dependente e o agent loga "missing unit in duration 15".
    interval: "15s"
