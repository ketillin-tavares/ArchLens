integrations:
  - name: nri-rabbitmq
    env:
      HOSTNAME: rabbitmq
      PORT: 15672
      USERNAME: archlens
      PASSWORD: archlens_dev
      USE_SSL: "false"
      # nri-rabbitmq exige JSON array string nos campos QUEUES/EXCHANGES/VHOSTS.
      # Lista YAML ou CSV simples leva a "invalid character ... looking for beginning of value".
      QUEUES: '["processing-service.pipeline","report-service.reports","upload-service.status-updates","processing-service.pipeline.dlq","report-service.reports.dlq","upload-service.status-updates.dlq"]'
      EXCHANGES: '["analise.events","analise.events.dlx"]'
      VHOSTS: '["/"]'
    interval: 15s
