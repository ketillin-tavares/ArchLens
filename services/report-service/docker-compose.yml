services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: report-service-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-report_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-report_pass}
      POSTGRES_DB: ${DATABASE_NAME:-report_db}
      NRIA_LICENSE_KEY: ${NRIA_LICENSE_KEY}
      NRIA_DISPLAY_NAME: report-service-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-report_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-service-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: report-service-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-service-network

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: report-service-migrations
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - report-service-network

  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: report-service-app
    env_file:
      - .env
    ports:
      - "8002:8002"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-service-network

  newrelic-infra:
    image: newrelic/infrastructure:latest
    container_name: report-service-newrelic-infra
    cap_add:
      - SYS_PTRACE
    pid: host
    privileged: true
    environment:
      NRIA_LICENSE_KEY: ${NRIA_LICENSE_KEY}
      NRIA_DISPLAY_NAME: ${NRIA_DISPLAY_NAME:-report-service}
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      report-service:
        condition: service_healthy
    networks:
      - report-service-network

volumes:
  postgres_data:
    driver: local

networks:
  report-service-network:
    driver: bridge
