name: "Infra: Terraform Deploy"

# ══════════════════════════════════════════════════════════════════════
#  Gerencia o stack 05-ec2-deploy via Terraform Cloud.
#  Trigger: manual apenas.
#
#  Secrets necessarios:
#    - TF_API_TOKEN  (Terraform Cloud user/team token)
# ══════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_CLOUD_ORGANIZATION: "archlens"
  TF_VERSION: "1.13.3"
  AWS_REGION: "us-east-2"

jobs:
  ec2-plan:
    name: "05-ec2-deploy (plan)"
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: infra/terraform/05-ec2-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: infra/terraform/05-ec2-deploy/.terraform/providers
          key: tf-ec2-${{ runner.os }}-${{ hashFiles('infra/terraform/05-ec2-deploy/.terraform.lock.hcl') }}
          restore-keys: tf-ec2-${{ runner.os }}-

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan | tee plan.txt

      - name: Post plan to summary
        run: |
          echo '### 05-ec2-deploy — Terraform Plan' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -80 plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-ec2
          path: infra/terraform/05-ec2-deploy/tfplan
          retention-days: 1

  ec2-apply:
    name: "05-ec2-deploy (apply)"
    runs-on: ubuntu-latest
    needs: [ec2-plan]
    if: >-
      always() &&
      needs.ec2-plan.result == 'success' &&
      github.event.inputs.action == 'apply'
    defaults:
      run:
        working-directory: infra/terraform/05-ec2-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: infra/terraform/05-ec2-deploy/.terraform/providers
          key: tf-ec2-${{ runner.os }}-${{ hashFiles('infra/terraform/05-ec2-deploy/.terraform.lock.hcl') }}
          restore-keys: tf-ec2-${{ runner.os }}-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-ec2
          path: infra/terraform/05-ec2-deploy

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Post outputs to summary
        run: |
          echo '### 05-ec2-deploy — Outputs' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform output -no-color 2>/dev/null | grep -vE "secret_arns|rds_endpoint|rds_address" >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  ec2-destroy:
    name: "05-ec2-deploy (destroy)"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: infra/terraform/05-ec2-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
