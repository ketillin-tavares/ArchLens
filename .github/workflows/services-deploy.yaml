name: "Services: Build & Deploy"

# ── Trigger por tag (v*) ou manual ───────────────────────────────────
# Criar tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (or all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - upload-service
          - processing-service
          - report-service

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-2"
  EKS_CLUSTER_NAME: "archlens-cluster"
  K8S_NAMESPACE: "archlens"

jobs:
  # ── Detectar quais serviços mudaram ────────────────────────────────
  detect-changes:
    name: "Detect changed services"
    runs-on: ubuntu-latest
    outputs:
      upload: ${{ steps.changes.outputs.upload }}
      processing: ${{ steps.changes.outputs.processing }}
      report: ${{ steps.changes.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SVC="${{ github.event.inputs.service }}"
            echo "upload=$( [[ "$SVC" == "all" || "$SVC" == "upload-service" ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "processing=$( [[ "$SVC" == "all" || "$SVC" == "processing-service" ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "report=$( [[ "$SVC" == "all" || "$SVC" == "report-service" ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          else
            # Tag release — deploya todos os serviços
            echo "upload=true" >> "$GITHUB_OUTPUT"
            echo "processing=true" >> "$GITHUB_OUTPUT"
            echo "report=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          echo "### Services to deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- upload-service: ${{ steps.changes.outputs.upload }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- processing-service: ${{ steps.changes.outputs.processing }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- report-service: ${{ steps.changes.outputs.report }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Build & Deploy (matrix por serviço) ────────────────────────────
  build-deploy:
    name: "${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: upload-service
            enabled: ${{ needs.detect-changes.outputs.upload }}
          - service: processing-service
            enabled: ${{ needs.detect-changes.outputs.processing }}
          - service: report-service
            enabled: ${{ needs.detect-changes.outputs.report }}
    if: >-
      needs.detect-changes.outputs.upload == 'true' ||
      needs.detect-changes.outputs.processing == 'true' ||
      needs.detect-changes.outputs.report == 'true'

    steps:
      - name: Skip if unchanged
        if: matrix.enabled != 'true'
        run: echo "Skipping ${{ matrix.service }} (no changes)" && exit 0

      - name: Checkout
        if: matrix.enabled == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: matrix.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: matrix.enabled == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push Docker image
        if: matrix.enabled == 'true'
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_REPO: archlens/${{ matrix.service }}
          IMAGE_TAG: ${{ github.ref_name }}
          DOCKER_BUILDKIT: "1"
        run: |
          IMAGE_URI="$ECR_REGISTRY/$IMAGE_REPO:$IMAGE_TAG"

          # ECR está IMMUTABLE — não pushamos :latest (não pode ser sobrescrito).
          # Cache via BuildKit inline (--build-arg BUILDKIT_INLINE_CACHE=1) embutido na própria tag versionada.
          # Tenta usar como cache a última tag publicada (ignora se não houver).
          PREVIOUS_TAG=$(aws ecr describe-images --repository-name "$IMAGE_REPO" --region "$AWS_REGION" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' --output text 2>/dev/null || echo "")
          CACHE_FROM=""
          if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "None" ]; then
            CACHE_IMG="$ECR_REGISTRY/$IMAGE_REPO:$PREVIOUS_TAG"
            docker pull "$CACHE_IMG" || true
            CACHE_FROM="--cache-from $CACHE_IMG"
          fi

          docker build \
            $CACHE_FROM \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE_URI" \
            -f services/${{ matrix.service }}/Dockerfile \
            services/${{ matrix.service }}

          docker push "$IMAGE_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Scan image for vulnerabilities
        if: matrix.enabled == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build.outputs.image }}
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"
          format: "table"
          # CVEs aceitas com justificativa em services/<svc>/.trivyignore
          trivyignores: services/${{ matrix.service }}/.trivyignore

      - name: Update kubeconfig
        if: matrix.enabled == 'true'
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        if: matrix.enabled == 'true'
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
        run: |
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}="$IMAGE_URI" \
            -n ${{ env.K8S_NAMESPACE }}

          if ! kubectl rollout status deployment/${{ matrix.service }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s; then
            echo "::error::Rollout failed — executing rollback"
            kubectl rollout undo deployment/${{ matrix.service }} \
              -n ${{ env.K8S_NAMESPACE }}
            exit 1
          fi

      - name: Post-deploy health check
        if: matrix.enabled == 'true'
        run: |
          echo "### ${{ matrix.service }} deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"

          # Verificar pods running
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} \
            -l app=${{ matrix.service }} \
            -o wide >> "$GITHUB_STEP_SUMMARY"
