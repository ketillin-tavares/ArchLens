name: "EC2: Build & Deploy"

# ══════════════════════════════════════════════════════════════════════
#  Pipeline alternativa ao deploy em EKS. Builda 5 imagens, sobe para o
#  ECR archlens-ec2/* e dispara deploy.sh via SSH na EC2.
#
#  Trigger: APENAS manual (workflow_dispatch).
#
#  Secrets necessarios no repo:
#    - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (com permissao ssm:SendCommand,
#      ssm:GetCommandInvocation, ec2:DescribeInstances)
#    - EC2_HOST                   (DNS publico da EC2 — usado no health check)
#    - VITE_CLERK_PUBLISHABLE_KEY (baked no build do frontend)
#
#  EC2_SSH_USER e EC2_SSH_KEY nao sao mais necessarios — deploy usa SSM.
#
#  Variaveis (Variables) no repo:
#    - VITE_CLERK_JWT_TEMPLATE (opcional, default "archlens")
# ══════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Servicos para builder/deployar (csv) ou 'all'"
        required: true
        default: "all"
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-2"
  ECR_NAMESPACE: "archlens-ec2"

jobs:
  # ── Build & push de cada imagem ────────────────────────────────────
  build:
    name: "build ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: upload-service
            context: services/upload-service
            dockerfile: services/upload-service/Dockerfile
          - service: processing-service
            context: services/processing-service
            dockerfile: services/processing-service/Dockerfile
          - service: report-service
            context: services/report-service
            dockerfile: services/report-service/Dockerfile
          - service: litellm-gateway
            context: gateways/litellm
            dockerfile: gateways/litellm/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter by input
        id: filter
        run: |
          INPUT="${{ github.event.inputs.services || 'all' }}"
          if [[ "$INPUT" == "all" ]] || [[ ",$INPUT," == *",${{ matrix.service }},"* ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tag
        if: steps.filter.outputs.enabled == 'true'
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        if: steps.filter.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.enabled == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push
        if: steps.filter.outputs.enabled == 'true'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_REPO: ${{ env.ECR_NAMESPACE }}/${{ matrix.service }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          DOCKER_BUILDKIT: "1"
        run: |
          IMAGE_URI="$ECR_REGISTRY/$IMAGE_REPO:$IMAGE_TAG"

          # Cache da ultima imagem publicada (BuildKit inline)
          PREVIOUS_TAG=$(aws ecr describe-images \
            --repository-name "$IMAGE_REPO" --region "$AWS_REGION" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' \
            --output text 2>/dev/null || echo "")
          CACHE_FROM=""
          if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "None" ]; then
            CACHE_IMG="$ECR_REGISTRY/$IMAGE_REPO:$PREVIOUS_TAG"
            docker pull "$CACHE_IMG" || true
            CACHE_FROM="--cache-from $CACHE_IMG"
          fi

          # Build args extras para o frontend (Vite envs precisam estar no build).
          # VITE_KONG_BASE_URL=/api: identico ao local. SPA chama /api/v1/* e o
          # nginx.ec2.conf faz proxy /api -> kong (com rewrite, igual local).
          EXTRA_ARGS=""
          if [ "${{ matrix.service }}" = "frontend" ]; then
            EXTRA_ARGS="--build-arg NGINX_CONF=nginx.ec2.conf \
                       --build-arg VITE_KONG_BASE_URL=/api \
                       --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
                       --build-arg VITE_CLERK_JWT_TEMPLATE=${{ vars.VITE_CLERK_JWT_TEMPLATE || 'archlens' }}"
          fi

          docker build \
            $CACHE_FROM \
            $EXTRA_ARGS \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE_URI" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"

          docker push "$IMAGE_URI"

      - name: Skip notice
        if: steps.filter.outputs.enabled != 'true'
        run: echo "Skipping ${{ matrix.service }} (not in inputs.services)"

  # ── Deploy via AWS SSM Run Command ─────────────────────────────────
  # Usa SSM (IAM-based) em vez de SSH para nao precisar abrir porta 22
  # para os IPs dos runners do GitHub Actions. O agente SSM ja esta na
  # EC2 (instalado por padrao em Ubuntu 22.04) e a IAM role tem a policy
  # AmazonSSMManagedInstanceCore via 05-ec2-deploy/iam.tf.
  deploy:
    name: "deploy"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Descobrir Instance ID (tag Name=archlens-ec2)
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=archlens-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Instance com tag Name=archlens-ec2 nao encontrada (verifique se a EC2 esta running)"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instance: $INSTANCE_ID"

      - name: Run deploy.sh via SSM
        id: ssm
        run: |
          set -e
          # Envia o comando para a EC2 via SSM. Roda como user 'ubuntu'
          # (mesmo dono de /opt/archlens apos o chown do user-data).
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ArchLens ${{ github.sha }}" \
            --parameters '{
              "commands": ["sudo -u ubuntu /opt/archlens/infra/scripts/ec2/deploy.sh '"${{ github.sha }}"'"],
              "executionTimeout": ["1800"]
            }' \
            --query 'Command.CommandId' --output text)

          echo "Command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

          # Aguarda a execucao completar (max ~30 min)
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query 'Status' --output text)

          echo "▶ Output do deploy.sh:"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query 'StandardOutputContent' --output text | tail -200

          if [ "$STATUS" != "Success" ]; then
            echo "::error::deploy.sh falhou (status=$STATUS)"
            echo "▶ STDERR:"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ steps.ec2.outputs.instance_id }}" \
              --query 'StandardErrorContent' --output text | tail -100
            exit 1
          fi

      - name: Post-deploy health check
        run: |
          set -e
          for path in "/health" ":8000/upload/health"; do
            URL="http://${{ secrets.EC2_HOST }}${path}"
            echo "▶ GET $URL"
            for i in $(seq 1 12); do
              if curl -fsS "$URL" >/dev/null; then
                echo "  ✓ healthy"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "::error::$URL nao respondeu apos 60s"
                exit 1
              fi
              sleep 5
            done
          done

      - name: Summary
        run: |
          echo "### EC2 deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Instance: \`${{ steps.ec2.outputs.instance_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SSM Command: \`${{ steps.ssm.outputs.cmd_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: http://${{ secrets.EC2_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Kong API: http://${{ secrets.EC2_HOST }}:8000" >> "$GITHUB_STEP_SUMMARY"
